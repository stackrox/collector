name: Collector Agent

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Agent operation
        type: choice
        options:
          - spike
          - revise
        required: true
      number:
        description: Issue number (spike) or PR number (revise)
        type: string
        required: true

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      operation: ${{ steps.validate.outputs.operation }}
      number: ${{ steps.validate.outputs.number }}
      target_sha: ${{ steps.resolve.outputs.target_sha }}
    steps:
      - name: Validate inputs
        id: validate
        run: |
          set -euo pipefail

          operation="${{ inputs.operation }}"
          number="${{ inputs.number }}"

          if [[ ! "$number" =~ ^[0-9]+$ ]]; then
            echo "::error::number must be numeric, got: ${number}"
            exit 1
          fi

          echo "operation=${operation}" >> "$GITHUB_OUTPUT"
          echo "number=${number}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Resolve target
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          operation="${{ steps.validate.outputs.operation }}"
          number="${{ steps.validate.outputs.number }}"
          repo="${{ github.repository }}"

          if [[ "$operation" == "spike" ]]; then
            state="$(gh issue view "$number" --json state --jq .state)" \
              || { echo "::error::Could not fetch issue #${number}"; exit 1; }
            if [[ "$state" == "CLOSED" ]]; then
              echo "::error::Issue #${number} is closed"
              exit 1
            fi
            target_sha="$(git rev-parse HEAD)"
          else
            pr_json="$(gh pr view "$number" --json state,headRefOid)" \
              || { echo "::error::Could not fetch PR #${number}"; exit 1; }
            state="$(echo "$pr_json" | jq -r .state)"
            if [[ "$state" != "OPEN" ]]; then
              echo "::error::PR #${number} is not open (state: ${state})"
              exit 1
            fi
            target_sha="$(echo "$pr_json" | jq -r .headRefOid)"
          fi

          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"
          echo "Resolved target SHA: ${target_sha}"

      - name: Prepare request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          operation="${{ steps.validate.outputs.operation }}"
          number="${{ steps.validate.outputs.number }}"
          target_sha="${{ steps.resolve.outputs.target_sha }}"
          repo="${{ github.repository }}"
          workflow_sha="${{ github.sha }}"

          mkdir -p artifacts

          if [[ "$operation" == "spike" ]]; then
            issue_json="$(gh issue view "$number" --json title,body,state,updatedAt)"

            jq -n \
              --arg schema_version "1" \
              --arg operation "spike-issue" \
              --arg repository "$repo" \
              --argjson number "$number" \
              --arg issue_title "$(echo "$issue_json" | jq -r .title)" \
              --arg issue_body "$(echo "$issue_json" | jq -r .body)" \
              --arg base_sha "$target_sha" \
              --arg requested_by "${{ github.actor }}" \
              --arg workflow_sha "$workflow_sha" \
              --argjson publish false \
              '{
                schema_version: $schema_version,
                operation: $operation,
                repository: $repository,
                number: $number,
                issue_title: $issue_title,
                issue_body: $issue_body,
                base_sha: $base_sha,
                requested_by: $requested_by,
                workflow_sha: $workflow_sha,
                publish: $publish
              }' > artifacts/request.json
          else
            pr_json="$(gh pr view "$number" --json title,body,state,headRefOid,baseRefOid,isDraft,author,labels,reviewDecision)"

            reviews_json="$(gh api "repos/${repo}/pulls/${number}/reviews" \
              --jq '[.[] | {author: .user.login, state: .state, body: .body, submitted_at: .submitted_at}]' 2>/dev/null || echo '[]')"

            comments_json="$(gh api "repos/${repo}/issues/${number}/comments" \
              --jq '[.[] | {author: .user.login, body: .body, created_at: .created_at, id: .id}]' 2>/dev/null || echo '[]')"

            review_comments_json="$(gh api "repos/${repo}/pulls/${number}/comments" \
              --jq '[.[] | {author: .user.login, body: .body, path: .path, line: .line, created_at: .created_at, id: .id}]' 2>/dev/null || echo '[]')"

            checks_json="$(gh pr checks "$number" --json name,state,conclusion 2>/dev/null || echo '[]')"

            labels_json="$(echo "$pr_json" | jq '[.labels[].name]')"

            jq -n \
              --arg schema_version "1" \
              --arg operation "revise-pr" \
              --arg repository "$repo" \
              --argjson number "$number" \
              --arg base_sha "$(echo "$pr_json" | jq -r .baseRefOid)" \
              --arg head_sha "$target_sha" \
              --arg pr_body "$(echo "$pr_json" | jq -r .body)" \
              --argjson reviews "$reviews_json" \
              --argjson unresolved_threads "$review_comments_json" \
              --argjson comments "$comments_json" \
              --argjson check_summary "$checks_json" \
              --argjson labels "$labels_json" \
              --arg requested_by "${{ github.actor }}" \
              --arg workflow_sha "$workflow_sha" \
              --argjson publish false \
              '{
                schema_version: $schema_version,
                operation: $operation,
                repository: $repository,
                number: $number,
                base_sha: $base_sha,
                head_sha: $head_sha,
                pr_body: $pr_body,
                reviews: $reviews,
                unresolved_threads: $unresolved_threads,
                comments: $comments,
                check_summary: $check_summary,
                labels: $labels,
                requested_by: $requested_by,
                workflow_sha: $workflow_sha,
                publish: $publish
              }' > artifacts/request.json
          fi

          echo "Request prepared:"
          jq . artifacts/request.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: request
          path: artifacts/request.json

  execute:
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          fetch-depth: 0
          submodules: recursive

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: request
          path: artifacts

      - name: Verify checkout SHA
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          expected="${{ needs.prepare.outputs.target_sha }}"
          if [[ "$actual" != "$expected" ]]; then
            echo "::error::SHA mismatch: expected ${expected}, got ${actual}"
            exit 1
          fi
          echo "Checkout verified: ${actual}"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2.1.10
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code@latest

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}

      - name: Run agent
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CLAUDE_CODE_USE_VERTEX: "1"
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ steps.auth.outputs.project_id }}
          CLOUD_ML_REGION: us-east5
        run: |
          set -euo pipefail

          operation="${{ needs.prepare.outputs.operation }}"

          case "$operation" in
            spike) skill="spike-issue" ;;
            revise) skill="revise-pr" ;;
          esac

          mkdir -p artifacts

          claude \
            --print \
            --dangerously-skip-permissions \
            --max-turns 80 \
            -p "Read AGENTS.md for context. Then follow the instructions in the ${skill} skill exactly. The request is at artifacts/request.json. Write results to the artifacts/ directory." \
            || true

          if [[ ! -f artifacts/result.json ]]; then
            jq -n \
              --arg status "terminal_failure" \
              --arg operation "${{ needs.prepare.outputs.operation }}-$( [[ "$operation" == "spike" ]] && echo "issue" || echo "pr" )" \
              --arg repository "${{ github.repository }}" \
              --argjson number "${{ needs.prepare.outputs.number }}" \
              --arg summary "Agent did not produce result.json" \
              '{
                schema_version: "1",
                status: $status,
                operation: $operation,
                repository: $repository,
                number: $number,
                summary: $summary
              }' > artifacts/result.json

            echo "No results" > artifacts/summary.md
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: result
          path: |
            artifacts/result.json
            artifacts/summary.md
            artifacts/change.patch

      - name: Cleanup
        if: always()
        run: |
          git checkout -- . 2>/dev/null || true
          git clean -fd cmake-build 2>/dev/null || true

  report:
    needs: [prepare, execute]
    runs-on: ubuntu-24.04
    if: always()
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: request
          path: artifacts
        continue-on-error: true

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: result
          path: artifacts
        continue-on-error: true

      - name: Generate summary
        run: |
          set -euo pipefail

          operation="${{ needs.prepare.outputs.operation }}"
          number="${{ needs.prepare.outputs.number }}"
          target_sha="${{ needs.prepare.outputs.target_sha }}"

          {
            echo "## Collector Agent Result"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Operation | \`${operation}\` |"
            echo "| Number | #${number} |"
            echo "| Target SHA | \`${target_sha}\` |"

            if [[ -f artifacts/result.json ]]; then
              status="$(jq -r .status artifacts/result.json 2>/dev/null || echo unknown)"
              summary="$(jq -r .summary artifacts/result.json 2>/dev/null || echo "")"
              echo "| Status | \`${status}\` |"
              if [[ -n "$summary" && "$summary" != "null" ]]; then
                echo "| Summary | ${summary} |"
              fi
            else
              echo "| Status | \`no result\` |"
            fi

            echo ""

            if [[ -f artifacts/summary.md ]]; then
              echo "### Agent Summary"
              echo ""
              cat artifacts/summary.md
            fi

            if [[ -f artifacts/change.patch ]]; then
              patch_lines="$(wc -l < artifacts/change.patch | tr -d ' ')"
              if [[ "$patch_lines" -gt 0 ]]; then
                echo ""
                echo "### Patch"
                echo ""
                echo "Patch produced: ${patch_lines} lines. Download from artifacts."
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
