name: Collector Integration Tests

on:
  workflow_call:
    inputs:
      collector-tag:
        description: |
          Tag used for running the integration tests
        type: string
        required: true
      collector-qa-tag:
        description: |
          Tag used for QA containers
        type: string
        required: true
      collector-tests-tag:
        description: |
          Tag used for the test container
        type: string
        required: true
      job-tag:
        description: |
          Used to differentiate between different sources when creating
          VMs in GCP.
        type: string
        default: ""
      collector-repo:
        description: |
          Optional repository to use for the collector image
        type: string
        default: "quay.io/rhacs-eng/collector"
      is-konflux:
        description: |
          Marker for workflows triggered for a konflux build.
        type: boolean
        default: false
      large-box:
        description: |
          Marker for workflows that suppose to run tests on nodes with large
          number of CPU cores.
        type: boolean
        default: false

jobs:
  amd64-integration-tests:
    uses: ./.github/workflows/integration-tests-vm-type.yml
    strategy:
      # ensure that if one part of the matrix fails, the
      # rest will continue
      fail-fast: false
      matrix:
        vm_type:
          - rhcos
          - ubuntu-os
          - cos
          - flatcar
          - fedora-coreos
          - rhel
          - rhel-sap
    with:
      vm_type: ${{ matrix.vm_type }}
      collector-tag: ${{ inputs.collector-tag }}
      collector-qa-tag: ${{ inputs.collector-qa-tag }}
      collector-tests-tag: ${{ inputs.collector-tests-tag }}
      job-tag: ${{ inputs.job-tag }}
      collector-repo: ${{ inputs.collector-repo }}
    secrets: inherit

  amd64-integration-tests-large-box:
    uses: ./.github/workflows/integration-tests-vm-type.yml
    if: contains(github.event.pull_request.labels.*.name, 'large-box-integration-tests') || inputs.large-box
    strategy:
      # ensure that if one part of the matrix fails, the
      # rest will continue
      fail-fast: false
      matrix:
        vm_type:
          - fedora-coreos-large-node
    with:
      vm_type: ${{ matrix.vm_type }}
      collector-tag: ${{ inputs.collector-tag }}
      collector-qa-tag: ${{ inputs.collector-qa-tag }}
      collector-tests-tag: ${{ inputs.collector-tests-tag }}
      job-tag: ${{ inputs.job-tag }}
      collector-repo: ${{ inputs.collector-repo }}
    secrets: inherit

  arm64-integration-tests:
    uses: ./.github/workflows/integration-tests-vm-type.yml
    strategy:
      # ensure that if one part of the matrix fails, the
      # rest will continue
      fail-fast: false
      matrix:
        vm_type:
          - rhcos-arm64
          - cos-arm64
          - rhel-arm64
          - ubuntu-arm
          # Disable due to ROX-35438
          #- fcarm

    with:
      vm_type: ${{ matrix.vm_type }}
      collector-tag: ${{ inputs.collector-tag }}
      collector-qa-tag: ${{ inputs.collector-qa-tag }}
      collector-tests-tag: ${{ inputs.collector-tests-tag }}
      job-tag: ${{ inputs.job-tag }}
      collector-repo: ${{ inputs.collector-repo }}
    secrets: inherit

  s390x-integration-tests:
    uses: ./.github/workflows/integration-tests-vm-type.yml
    with:
      vm_type: rhel-s390x
      collector-tag: ${{ inputs.collector-tag }}
      collector-qa-tag: ${{ inputs.collector-qa-tag }}
      collector-tests-tag: ${{ inputs.collector-tests-tag }}
      job-tag: ${{ inputs.job-tag }}
      collector-repo: ${{ inputs.collector-repo }}
    secrets: inherit

  ppc64le-integration-tests:
    uses: ./.github/workflows/integration-tests-vm-type.yml
    with:
      vm_type: rhel-ppc64le
      collector-tag: ${{ inputs.collector-tag }}
      collector-qa-tag: ${{ inputs.collector-qa-tag }}
      collector-tests-tag: ${{ inputs.collector-tests-tag }}
      job-tag: ${{ inputs.job-tag }}
      collector-repo: ${{ inputs.collector-repo }}
    secrets: inherit

  collect-failures:
    runs-on: ubuntu-24.04
    if: always() && contains(join(needs.*.result, ','), 'failure') && github.event_name != 'pull_request'
    needs:
      - amd64-integration-tests
      - arm64-integration-tests
      - s390x-integration-tests
      - ppc64le-integration-tests
    outputs:
      failed_jobs: ${{ steps.collect.outputs.failed_jobs }}
    steps:
      - name: Collect failed job names
        id: collect
        run: |
          FAILED_JOBS=""
          if [[ "${{ needs.amd64-integration-tests.result }}" == "failure" ]]; then
            FAILED_JOBS="amd64-integration-tests"
          fi
          if [[ "${{ needs.arm64-integration-tests.result }}" == "failure" ]]; then
            FAILED_JOBS="${FAILED_JOBS:+$FAILED_JOBS,}arm64-integration-tests"
          fi
          if [[ "${{ needs.s390x-integration-tests.result }}" == "failure" ]]; then
            FAILED_JOBS="${FAILED_JOBS:+$FAILED_JOBS,}s390x-integration-tests"
          fi
          if [[ "${{ needs.ppc64le-integration-tests.result }}" == "failure" ]]; then
            FAILED_JOBS="${FAILED_JOBS:+$FAILED_JOBS,}ppc64le-integration-tests"
          fi
          echo "failed_jobs=$FAILED_JOBS" >> "$GITHUB_OUTPUT"

  analyze-and-notify:
    needs: collect-failures
    uses: ./.github/workflows/analyze-and-notify.yml
    with:
      failed-jobs: ${{ needs.collect-failures.outputs.failed_jobs }}
      workflow-name: "Integration Tests"
    secrets: inherit
