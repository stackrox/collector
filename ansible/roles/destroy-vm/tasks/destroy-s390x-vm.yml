- name: Check for existing VSI
  delegate_to: localhost
  ibm.cloudcollection.ibm_is_instance_info:
    name: "{{ inventory_hostname }}"
  failed_when:
    - vsi.rc != 0
    - '"No Instance found" not in vsi.stderr'
  register: vsi

- name: Delete IBM Z VSI
  delegate_to: localhost
  ibm.cloudcollection.ibm_is_instance:
    state: absent
    id: "{{ vsi.resource.id }}"
    vpc: "{{ vsi.resource.vpc }}"
    keys: []
    image: "{{ vsi.resource.image }}"
    profile: "{{ vsi.resource.profile }}"
    zone: "{{ vsi.resource.zone }}"
    primary_network_interface:
      - subnet: "{{ vsi.resource.primary_network_interface[0].subnet }}"
  ignore_errors: true
  when: vsi.resource.id is defined

- name: Check for existing floating IP
  delegate_to: localhost
  ibm.cloudcollection.ibm_is_floating_ip_info:
    name: "{{ inventory_hostname }}-fip"
  failed_when:
    - fip.rc != 0
    - '"No floatingIP found" not in fip.stderr'
  register: fip

- name: Release floating IP
  delegate_to: localhost
  ibm.cloudcollection.ibm_is_floating_ip:
    state: absent
    id: "{{ fip.resource.id }}"
    zone: "{{ fip.resource.zone }}"
  ignore_errors: true
  when: fip.resource.id is defined

- name: Check for existing Security Group
  delegate_to: localhost
  ibm.cloudcollection.ibm_is_security_group_info:
    name: "{{ inventory_hostname }}-sg"
  failed_when:
    - sg.rc != 0
    - '"No Security Group found" not in sg.stderr'
  register: sg

- name: Delete Security Group
  delegate_to: localhost
  ibm.cloudcollection.ibm_is_security_group:
    state: absent
    name: "{{ inventory_hostname }}-sg"
    vpc: "{{ s390x.vpc_id }}"
  register: sg_delete
  failed_when:
    - sg_delete.rc | default(0) != 0
    - '"Target not found" not in (sg_delete.stderr | default(""))'
    - '"Target not found" not in (sg_delete.msg | default(""))'
    - '"not_found" not in (sg_delete.stderr | default(""))'
    - '"not_found" not in (sg_delete.msg | default(""))'
  when: sg.resource.id is defined

- name: Remove IBM inventory file (delete file)
  delegate_to: localhost
  file:
    path: '{{ ibm_output_inventory_file }}'
    state: absent
