---
- name: set distro to RHEL
  set_fact:
    distro: rhel
  when: vm_arch != "ppc64le"

# There's currently no ppc64le RHEL docker package, so we use CentOS instead.
- name: set distro to CentOS
  set_fact:
    distro: centos
  when: vm_arch == "ppc64le"

- name: Register server with Red Hat for IBM POWER vms
  tags: attach_subscription
  community.general.redhat_subscription:
    state: present
    username: "{{ redhat_username }}"
    password: "{{ redhat_password }}"
    auto_attach: true
  register: registration
  retries: 2
  delay: 30
  until: registration is not failed
  when: vm_arch == "ppc64le" or vm_arch == "s390x"

- name: Update DNF cache
  ansible.builtin.shell: |
    dnf makecache

- name: Install needed utilities
  ansible.builtin.dnf:
    name:
      - git
      - make
  register: registration
  retries: 2
  delay: 30
  until: registration is not failed

- name: Add docker repos
  ansible.builtin.shell: |
    dnf config-manager --add-repo "https://download.docker.com/linux/{{ distro }}/docker-ce.repo"
  when: runtime_command == 'docker'

- name: Install docker
  ansible.builtin.dnf:
    name:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-buildx-plugin
    - docker-compose-plugin
    state: present
  when: runtime_command == 'docker'

- name: Install podman
  ansible.builtin.dnf:
    name:
      - podman
      - podman-docker
      - git
      - make
    state: latest
    update_cache: true
  when: runtime_command == 'podman'

# Collector binds host ports 8080 (HTTP API) and 9090 (Prometheus metrics) when
# running integration tests. RHEL Web Console (cockpit) also defaults to 9090
# and is installed on many RHEL images (including RHEL 10 on s390x).
- name: Disable cockpit socket (conflicts with collector Prometheus port 9090)
  ansible.builtin.systemd:
    name: cockpit.socket
    state: stopped
    enabled: false
  failed_when: false

